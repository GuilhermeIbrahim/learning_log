{% extends "learning_log/base.html" %}

{% load django_bootstrap5 %}

{% block header %}
    <h2>Registre-se.</h2>
{% endblock header %}


{% block content %}

        <form action="{% url 'register' %}" method="post">
        {% csrf_token %}
        {% bootstrap_form form %}

        {% bootstrap_button button_type="submit" content="Registrar" %}
        <input type="hidden" name="next" value="{% url 'index' %}">
    </form>

{% endblock content %}
