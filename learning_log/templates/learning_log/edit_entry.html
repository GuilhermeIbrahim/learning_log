{% extends "learning_log/base.html" %}
{% load django_bootstrap5 %}

{% block content %}

    <p><a href="{% url 'topic' topic.id %}">{{ topic }}</a></p>

    <p>Editar anotação:</p>

    <form action="{% url 'edit_entry' entry.id %}" method="post">
        {% csrf_token %}
        {% bootstrap_form form %}

        {% bootstrap_button button_type="submit" content="Salvar" %}
    </form>

{% endblock content %}
