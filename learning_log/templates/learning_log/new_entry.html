{% extends "learning_log/base.html" %}
{% load django_bootstrap5 %}


{% block header %}
    <h2>Adicione uma nova anotação:</h2>
{% endblock header %}

{% block content %}

    <p><a href="{% url 'topic' topic.id %}"{{ topic }}></a></p>

    <form action="{% url 'new_entry' topic.id %}" method="post">
        {% csrf_token %}
        {% bootstrap_form form %}

        {% bootstrap_button button_type="submit" content="Adicionar" %}
    </form>

{% endblock content %}
